core:
  workers: 4
  log_level: info
  listen:
    - "udp:0.0.0.0:5060"
    - "tcp:0.0.0.0:5060"

ims:
  enabled: true
  role: scscf
  realm: home.net
  scscf:
    listen:
      - "udp:0.0.0.0:5060"
    realm: home.net
    # HSS peer placeholder; override for real deployments.
    diameter_peers:
      - host: hss.home.net
        ip: 10.0.0.5
        port: 3868
    aka_algorithm: AKAv1-MD5
    default_expires: 3600
    min_expires: 60
    max_expires: 86400
