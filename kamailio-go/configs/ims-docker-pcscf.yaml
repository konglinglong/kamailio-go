core:
  workers: 4
  log_level: info
  listen:
    - "udp:0.0.0.0:5060"
    - "tcp:0.0.0.0:5060"

ims:
  enabled: true
  role: pcscf
  realm: home.net
  pcscf:
    listen:
      - "udp:0.0.0.0:5060"
    realm: home.net
    visited_network_id: visited.home.net
    # compose service names as next-hop addresses
    icscf_addr: "sip:icscf:5060"
    scscf_addr: "sip:scscf:5060"
    ipsec:
      enabled: false
